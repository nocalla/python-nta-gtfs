name: Bug report
description: Something in nta-gtfs isn't behaving as expected.
labels: ["needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal code snippet or steps that trigger the bug.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: nta-gtfs version
      description: Output of `uv pip show nta-gtfs` or the pinned version.
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or stack trace
      render: shell
